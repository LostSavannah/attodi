name: Test non-main branches

on:
  push: 
    branches: 
      - '!main' #exclude main branch
  workflow_dispatch: 

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python3 -m build

      - name: Install package
        run: |
          pip install $(ls ./dist/*.whl | head -n 1)

      - name: Test package
        run: |
          pip install pytest
          python3 -m pytest
