name: Deploy Package to Pypi

on:
  push: 
    branches: [main]
  workflow_dispatch: 

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          pip install -r requirements.txt
          python3 -m build
          curl https://app.hooklistener.com/w/my-first-endpoint-bzjg/built

      - name: Install and test distribution
        run: |
          curl https://app.hooklistener.com/w/my-first-endpoint-bzjg/testing
