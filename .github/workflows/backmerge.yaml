name: Main Backmerge

on:
  push: 
    branches: [main]
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          pip install build
          python3 ./project_updater.py "file=./pyproject.toml" "set-version-patch=${{ github.run_number }}"
          python3 -m build

      - name: Install and test release distribution
        run: |
          pip install pytest
          pip install $(ls ./dist/*.whl | head -n 1)
          python3 -m pytest


  back-merge:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Github Actions"

      - name: Merge main back to dev
        run: |
          git fetch origin dev
          git checkout dev
          git pull origin dev
          git merge origin/main -X theirs --no-ff -m "chore: automatic back-merge from main [skip ci]"
          git push origin dev
