name: Deploy Release

on:
  workflow_dispatch:

jobs:
  test-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          pip install build
          python3 ./project_updater.py "file=./pyproject.toml" "set-version-patch=${{ github.run_number }}"
          python3 -m build

      - name: Install and test release distribution
        run: |
          pip install pytest
          pip install $(ls ./dist/*.whl | head -n 1)
          python3 -m pytest

  deploy-release:
    runs-on: ubuntu-latest
    needs: test-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          pip install build
          python3 ./project_updater.py "file=./pyproject.toml" "set-version-patch=${{ github.run_number }}"
          python3 -m build

      - name: Deploy release distribution
        run: |
          pip install twine
          python3 -m twine upload dist/* -u __token__ -p ${{ secrets.PYPI_GLOBAL_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Github Actions"

      - name: Update pyproject.toml version and backmerge
        run: |
          git add ./pyproject.toml
          git commit -m "chore: update version"
          git push
          git fetch origin dev
          git checkout dev
          git pull origin dev
          git merge origin/main -X theirs --no-ff -m "chore: automatic back-merge from main [skip ci]"
          git push origin dev

